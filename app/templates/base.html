<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rasd — AI Video Analytics{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 0; }
        .hero { padding: 60px 0; text-align: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; margin-bottom: 40px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { font-size: 1.1rem; color: #94a3b8; max-width: 600px; margin: 0 auto 25px; }
        .feature-card { padding: 25px; border-radius: 12px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; text-align: center; }
        .feature-card h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .feature-card p { font-size: 0.9rem; color: #64748b; margin: 0; }
        .pro-badge { background: #3b82f6; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .cta-section { background: #1e293b; color: white; padding: 50px 0; text-align: center; border-radius: 12px; margin: 40px 0; }
        .cta-section h2 { margin-bottom: 15px; }
        .cta-section p { color: #94a3b8; margin-bottom: 25px; }
        .upload-section { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🔍 Rasd</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Upload</a>
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="https://rasdai.com" target="_blank">Get Pro</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
